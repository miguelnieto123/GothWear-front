<div class="auth-page">
  <div class="auth-panel">
    <div class="auth-deco">✦</div>
    <h2>Crear Cuenta</h2>
    <p class="auth-sub">Únete al lado oscuro</p>

    <div *ngIf="error" class="error-msg">{{ error }}</div>
    <div *ngIf="success" class="success-msg">{{ success }}</div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" [(ngModel)]="form.username" placeholder="Nombre de usuario" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="form.email" placeholder="tu@correo.com" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="form.userpassword" placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label>Tipo de cuenta</label>
      <select [(ngModel)]="form.id_rol">
        <option [value]="2">Cliente</option>
        <option [value]="1">Administrador</option>
      </select>
    </div>

    <button class="btn-primary full-width" (click)="onSubmit()" [disabled]="loading">
      <span *ngIf="loading" class="spinner"></span>
      {{ loading ? 'Registrando...' : 'Registrarse' }}
    </button>

    <p class="switch-link">¿Ya tienes cuenta? <a routerLink="/login">Iniciar sesión</a></p>
  </div>
</div>
