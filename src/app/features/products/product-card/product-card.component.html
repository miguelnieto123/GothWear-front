<div class="product-card" *ngIf="product">

  <h3>{{ product.productname }}</h3>

  <p class="description">
    {{ product.productdescription }}
  </p>

  <p class="price">
    ${{ product.price | number:'1.2-2' }}
  </p>

  <p class="stock">
    Stock: {{ product.stock }}
  </p>

  <!-- Mensajes -->
  <div *ngIf="addedMsg" class="success-msg">
    {{ addedMsg }}
  </div>

  <div *ngIf="error" class="error-msg">
    {{ error }}
  </div>

  <!-- Acciones -->
  <div class="actions">

    <!-- Cliente -->
    <button
      *ngIf="!isAdmin"
      class="btn-primary"
      (click)="addToCart()"
      [disabled]="product.stock === 0"
    >
      {{ product.stock === 0 ? 'Sin stock' : '🛒 Agregar' }}
    </button>

    <!-- Admin -->
    <button
      *ngIf="isAdmin"
      class="btn-danger"
      (click)="delete()"
    >
      🗑 Eliminar
    </button>

  </div>

</div>
