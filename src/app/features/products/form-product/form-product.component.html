<div class="form-container">
  <div class="form-card">
    <h2>{{ isEdit ? '✏️ Editar Producto' : '➕ Nuevo Producto' }}</h2>
    <div *ngIf="error" class="error-msg">{{ error }}</div>
    <div *ngIf="successMsg" class="success-msg">{{ successMsg }}</div>

    <div class="form-group">
      <label>Nombre del producto *</label>
      <input type="text" [(ngModel)]="form.productname" placeholder="Nombre" />
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea [(ngModel)]="form.productdescription" rows="4" placeholder="Descripción del producto"></textarea>
    </div>
    <div class="form-group">
      <label>Precio *</label>
      <input type="number" [(ngModel)]="form.price" placeholder="0.00" min="0" />
    </div>

    <div class="form-actions">
      <button class="btn-secondary" routerLink="/products">Cancelar</button>
      <button class="btn-primary" (click)="onSubmit()" [disabled]="loading">
        {{ loading ? 'Guardando...' : (isEdit ? 'Actualizar' : 'Crear') }}
      </button>
    </div>
  </div>
</div>
