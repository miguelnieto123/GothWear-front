<div class="form-container">
  <div class="form-card">
    <h2>{{ isEdit ? '✏️ Editar Producto' : '➕ Nuevo Producto' }}</h2>

    <div *ngIf="error" class="error-msg">{{ error }}</div>
    <div *ngIf="successMsg" class="success-msg">{{ successMsg }}</div>


    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Nombre del producto *</label>
        <input
          type="text"
          formControlName="productname"
          placeholder="Nombre"
        />

      
        <small class="error-msg" *ngIf="form.get('productname')?.touched && form.get('productname')?.invalid">
          El nombre es obligatorio
        </small>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea
          formControlName="productdescription"
          rows="4"
          placeholder="Descripción del producto">
        </textarea>
      </div>

      <div class="form-group">
        <label>Precio *</label>
        <input
          type="number"
          formControlName="price"
          placeholder="0.00"
          min="0"
        />

        <!-- ✅ Validación -->
        <small class="error-msg" *ngIf="form.get('price')?.touched && form.get('price')?.invalid">
          El precio debe ser válido
        </small>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" routerLink="/products">
          Cancelar
        </button>

        <button
          type="submit"
          class="btn-primary"
          [disabled]="loading || form.invalid"
        >
          {{ loading ? 'Guardando...' : (isEdit ? 'Actualizar' : 'Crear') }}
        </button>
      </div>

    </form>
  </div>
</div>
